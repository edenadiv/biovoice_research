experiment:
  name: asvspoof2021_la_real
  mode: fusion_plus_interpretable_features
  seed: 42
  output_root: outputs/runs
  save_predictions_as: csv

data:
  source_type: asvspoof2021_la
  dataset_name: ASVspoof2021_LA
  manifest_output_dir: external_data/asvspoof/staged_manifests
  utterance_manifest_path: external_data/asvspoof/staged_manifests/utterances.csv
  trial_manifest_path: external_data/asvspoof/staged_manifests/trials.csv
  split_manifest_dir: external_data/asvspoof/staged_manifests/splits
  asvspoof2019_la_zip: external_data/asvspoof/raw/ASVspoof2019_LA.zip
  asvspoof2021_la_eval_tar: external_data/asvspoof/raw/ASVspoof2021_LA_eval.tar.gz
  asvspoof2021_keys_tar: external_data/asvspoof/LA-keys-full.tar.gz
  asvspoof_meta_tar: external_data/asvspoof/ASVspoof2019_2021_VCTK_VCC_MetaInfo.tar.gz
  extract_root: external_data/asvspoof/extracted
  sample_rate: 16000
  train_split: train
  validation_split: val
  test_split: test
  max_duration_seconds: 12.0
  min_duration_seconds: 1.0
  enrollment_count: 3
  speaker_disjoint: true
  require_speaker_disjoint: true
  split_strategy: official_protocol
  use_existing_splits: true
  speech_threshold: 0.02
  quality_scan_mode: header_plus_sample
  quality_waveform_sample_size: 4000
  quality_progress_every: 250
  probe_trials_per_speaker:

preprocessing:
  target_sample_rate: 16000
  mono: true
  loudness_normalize: true
  silence_trim: true
  silence_threshold: 0.02
  min_speech_ratio: 0.20
  pad_to_seconds: 4.0
  truncate_to_seconds: 4.0
  inference_waveform_cache_size: 1024

segmentation:
  window_seconds: 1.0
  hop_seconds: 0.5
  min_segment_seconds: 0.5

model:
  feature:
    n_mels: 64
    n_fft: 400
    hop_length: 160
    win_length: 400
  speaker_encoder:
    embedding_dim: 64
    hidden_channels: 32
  anti_spoof:
    hidden_channels: 32
  fusion:
    use_trainable_head: true
    include_interpretable_features: true

training:
  device: auto
  batch_size: 16
  epochs: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 2

evaluation:
  sv_threshold: 0.55
  spoof_threshold: 0.50
  manual_review_margin: 0.0
  calibration_bins: 10
  threshold_sweep_points: 11
  prediction_progress_every: 500

plotting:
  dpi: 180
  style: seaborn-v0_8-whitegrid

explainability:
  suspicious_segment_count: 3
  explanation_feature_count: 5
  max_saved_case_files: 100

ablation:
  enabled: true
  segment_windows:
    - 0.5
    - 1.0
    - 1.5
  overlaps:
    - 0.25
    - 0.50
